name: 小程序最小闭环测试

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: 故意制造失败
        run: |
          echo "开始测试失败闭环"
          cat not-exist-file.txt
